name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v5
      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal
      - name: Check
        run: make check
      - name: Verify release version
        run: |
          version="${GITHUB_REF_NAME#v}"
          VERSION="$version" node -e 'const { readFileSync } = require("node:fs"); const version = process.env.VERSION; const pkg = JSON.parse(readFileSync("ts/package.json", "utf8")); if (pkg.version !== version) { throw new Error(`ts/package.json version ${pkg.version} != ${version}`); }'
          rust_version="$(awk -F '"' '/^version = / { print $2; exit }' rust/Cargo.toml)"
          test "$rust_version" = "$version"
          python_version="$(python - <<'PY'
from pathlib import Path
import re
text = Path("python/pyproject.toml").read_text()
print(re.search(r'^version = "([^"]+)"$', text, re.M).group(1))
PY
)"
          test "$python_version" = "$version"
          go_cobra_core_version="$(awk '/github.com\/samzong\/kitup\/go / { print $2; exit }' go-cobra/go.mod)"
          test "$go_cobra_core_version" = "v$version"
      - name: Check published versions
        id: published
        run: |
          version="${GITHUB_REF_NAME#v}"
          if npm view "@kitup/sdk@${version}" version >/dev/null 2>&1; then
            echo "npm=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm=false" >> "$GITHUB_OUTPUT"
          fi
          if curl -fsS "https://crates.io/api/v1/crates/kitup/${version}" >/dev/null 2>&1; then
            echo "crate=true" >> "$GITHUB_OUTPUT"
          else
            echo "crate=false" >> "$GITHUB_OUTPUT"
          fi
          if curl -fsS "https://pypi.org/pypi/kitup/${version}/json" >/dev/null 2>&1; then
            echo "pypi=true" >> "$GITHUB_OUTPUT"
          else
            echo "pypi=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Dry run npm package
        if: steps.published.outputs.npm != 'true'
        run: |
          cd ts
          npm pack --dry-run
      - name: Dry run crate
        if: steps.published.outputs.crate != 'true'
        run: |
          cd rust
          cargo publish --locked --dry-run
      - name: Build Python package
        if: steps.published.outputs.pypi != 'true'
        run: uv build --directory python
      - name: Publish npm package
        if: steps.published.outputs.npm != 'true'
        run: |
          cd ts
          npm publish --access public --provenance
      - name: Publish crate
        if: steps.published.outputs.crate != 'true'
        run: |
          cd rust
          cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish Python package
        if: steps.published.outputs.pypi != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
      - name: Publish Go module tags
        run: |
          version="${GITHUB_REF_NAME#v}"
          for module in go go-cobra; do
            go_tag="${module}/v${version}"
            if git rev-parse -q --verify "refs/tags/${go_tag}" >/dev/null; then
              test "$(git rev-list -n 1 "${go_tag}")" = "$GITHUB_SHA"
            else
              git tag "$go_tag" "$GITHUB_SHA"
              git push origin "refs/tags/${go_tag}"
            fi
          done
      - name: Create GitHub release
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Smoke published packages
        run: |
          scripts/smoke-release.sh "${GITHUB_REF_NAME#v}"
